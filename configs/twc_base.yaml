base_config: default.yaml

reproducibility:
  seed: 7
  deterministic_tf: true
  precision: "single"

system_model:
  # Use a small number of simulated tone groups for tractable wideband PF/unfolding runs.
  num_re_sim: 4
  simulate_full_band: false
  bs_total_tx_power_dbm: 49.0

noise:
  extra_noise_db: 0.0

topology:
  # Smaller but still multi-cell reference geometry for TWC comparisons.
  num_ut_per_sector: 6

pcp:
  num_sites: 7
  sectors_per_site: 3
  background_sites_fraction: 0.15
  ue_cluster_radius_m: 100.0
  hotspot_jitter_sigma_m: 350.0
  bs_cluster_sigma_m: 900.0

channel_model:
  num_bs_ant: 32
  num_ut_ant: 4

fixed_service:
  enabled: true
  num_receivers: 12
  in_target_db: -10.0
  sweep_override_i_max: none

antenna:
  correlation: steering_rank1

receiver:
  name: wmmse
  wmmse:
    num_iterations: 20
    fs_enforcement: budget_dual
    fs_lambda_search: false
    dual_step_mu: 0.02
    dual_step_lambda: 0.10
    damping_w: 0.90
    ridge_regularization: 1.0e-9
    convergence_tol: 1.0e-6
    lambda_update_mode: ratio

experiment:
  batch_size: 1
  num_batches: 6
  freeze_topology: true
  tf_compile: false

sweep:
  enabled: true
  variable: snr_db
  values: [-5.0, 0.0, 5.0, 10.0]

output:
  # Baseline repo outputs remain untouched; TWC package writes to twc.output_root.
  results_root: results
  experiment_name: baseline_wmmse
  overwrite: false

plotting:
  enabled: true
  format: png
  dpi: 220

twc:
  project_root: .
  output_root: results_twc
  checkpoint_root: results_twc/checkpoints

  coverage_rate_threshold_bpshz: 1.0
  coverage_sinr_threshold_db: 0.0

  pf:
    num_slots: 6
    ema_beta: 0.90
    weight_clip_min: 0.1
    weight_clip_max: 10.0
    init_avg_rate: 1.0

  cognitive_mask:
    active_fraction: 0.50
    min_active_tones: 1
    temperature: 1.0
    protect_top_l: 3

  hybrid:
    null_when_ratio_exceeds: 0.95

  unfolding:
    num_layers: 8
    init_damping: 0.85
    init_dual_step_mu: 0.02
    init_dual_step_lambda: 0.10

  training:
    num_steps: 300
    log_every: 10
    save_every: 25
    learning_rate: 5.0e-3
    grad_clip_norm: 5.0
    snr_db_choices: [-5.0, 0.0, 5.0, 10.0]
    lambda_power: 25.0
    lambda_fs: 25.0
    lambda_smooth: 1.0e-2
    random_weight_sigma: 0.70

  fer:
    modulation_orders: [2, 4]
    code_rates: [0.3, 0.5]
    k_bits: 1024
    num_frames_per_point: 128
    max_frame_errors: 100

  scaling:
    num_bs_ant_values: [16, 32, 64]
    num_ut_per_sector_values: [4, 6, 8]
    sweep_value_db: 5.0
    num_batches: 4

  selectivity:
    tau_rms_ns_values: [20.0, 50.0, 100.0, 200.0, 400.0]
    sweep_value_db: 5.0
    num_batches: 4
