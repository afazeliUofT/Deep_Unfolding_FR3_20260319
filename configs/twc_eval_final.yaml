base_config: twc_base.yaml

system_model:
  num_re_sim: 16
  simulate_full_band: false

receiver:
  wmmse:
    num_iterations: 48

experiment:
  num_batches: 40
  freeze_topology: false

sweep:
  enabled: true
  variable: snr_db
  values: [-10.0, -5.0, 0.0, 5.0, 10.0, 15.0, 20.0, 25.0]

twc:
  fer:
    modulation_orders: [2, 4, 6]
    code_rates: [0.3, 0.5, 0.7]
    sinr_metric: p50_sinr_db
    fallback_sinr_cols: [avg_sinr_db, p05_sinr_db, avg_user_rate_bps_per_hz]
    k_bits: 1024
    num_frames_per_point: 1024
    max_frame_errors: 400
    decoder_iterations: 20
    require_sionna: true
    allow_fallback: false
