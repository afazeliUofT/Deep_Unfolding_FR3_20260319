base_config: twc_base.yaml

system_model:
  num_re_sim: 8
  simulate_full_band: false

experiment:
  num_batches: 12
  freeze_topology: false

sweep:
  enabled: true
  variable: snr_db
  values: [-10.0, -5.0, 0.0, 5.0, 10.0, 15.0]

twc:
  fer:
    modulation_orders: [2, 4]
    code_rates: [0.3, 0.5]
    k_bits: 1024
    num_frames_per_point: 512
    max_frame_errors: 200
    decoder_iterations: 20
    require_sionna: true
    allow_fallback: false
